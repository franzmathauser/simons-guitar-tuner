<title>Ton-Gemetzel — Stimmgerät Mockup</title>
<style>
  :root{
    color-scheme: light dark;
    /* --- LIGHT (default): clean cool white --- */
    --bg:#eef2f7;
    --bg-2:#e3e9f0;
    --device:#ffffff;
    --device-2:#f7f9fc;
    --edge:#e2e8f0;
    --ink:#1a2230;
    --muted:#64748b;
    --faint:#94a3b8;
    --line:#eaeff5;
    --accent:#0d9488;
    --accent-ink:#0b6f66;
    --accent-glow:rgba(13,148,136,.24);
    --on-accent:#ffffff;
    --good:#16a34a;
    --flat:#2563eb;
    --sharp:#dc2626;
    --shadow:0 22px 48px -24px rgba(30,45,70,.30), 0 1px 0 rgba(255,255,255,.8) inset;
    --peg:#14b8a6;
    --peg-2:#0d9488;
    --track:#eef2f7;
    --font-display:"SF Pro Display",-apple-system,"Segoe UI",system-ui,sans-serif;
    --font-ui:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;
    --font-data:"SF Mono",ui-monospace,"Cascadia Code","Roboto Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e141c;
      --bg-2:#080c12;
      --device:#1a222e;
      --device-2:#151c27;
      --edge:#2a3542;
      --ink:#eef2f7;
      --muted:#93a1b5;
      --faint:#5a6675;
      --line:#222d3a;
      --accent:#2dd4bf;
      --accent-ink:#5eead4;
      --accent-glow:rgba(45,212,191,.28);
      --on-accent:#042a25;
      --good:#34d399;
      --flat:#60a5fa;
      --sharp:#f87171;
      --shadow:0 30px 70px -24px rgba(0,0,0,.65), 0 1px 0 rgba(255,255,255,.04) inset;
      --peg:#2dd4bf;
      --peg-2:#14b8a6;
      --track:#151c27;
    }
  }
  /* explicit theme overrides (toggle wins over OS in both directions) */
  :root[data-theme="light"]{
    --bg:#eef2f7;--bg-2:#e3e9f0;--device:#ffffff;--device-2:#f7f9fc;--edge:#e2e8f0;
    --ink:#1a2230;--muted:#64748b;--faint:#94a3b8;--line:#eaeff5;--accent:#0d9488;
    --accent-ink:#0b6f66;--accent-glow:rgba(13,148,136,.24);--on-accent:#ffffff;--good:#16a34a;--flat:#2563eb;
    --sharp:#dc2626;--shadow:0 22px 48px -24px rgba(30,45,70,.30), 0 1px 0 rgba(255,255,255,.8) inset;
    --peg:#14b8a6;--peg-2:#0d9488;--track:#eef2f7;
  }
  :root[data-theme="dark"]{
    --bg:#0e141c;--bg-2:#080c12;--device:#1a222e;--device-2:#151c27;--edge:#2a3542;
    --ink:#eef2f7;--muted:#93a1b5;--faint:#5a6675;--line:#222d3a;--accent:#2dd4bf;
    --accent-ink:#5eead4;--accent-glow:rgba(45,212,191,.28);--on-accent:#042a25;--good:#34d399;--flat:#60a5fa;
    --sharp:#f87171;--shadow:0 30px 70px -24px rgba(0,0,0,.65), 0 1px 0 rgba(255,255,255,.04) inset;
    --peg:#2dd4bf;--peg-2:#14b8a6;--track:#151c27;
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font-ui);
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, var(--bg) 0%, var(--bg-2) 70%) fixed;
    min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:clamp(14px,4vw,40px) 16px 40px;
    gap:18px;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- DEVICE ---------- */
  .device{
    width:100%;max-width:400px;
    background:linear-gradient(180deg,var(--device) 0%,var(--device-2) 100%);
    border:1px solid var(--edge);
    border-radius:28px;
    box-shadow:var(--shadow);
    overflow:hidden;
    position:relative;
  }
  .device::before{ /* top sheen */
    content:"";position:absolute;inset:0 0 auto 0;height:120px;pointer-events:none;
    background:linear-gradient(180deg,rgba(255,255,255,.10),transparent);
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 18px 12px;
  }
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .brand__mark{
    width:26px;height:26px;flex:none;border-radius:8px;
    background:radial-gradient(circle at 35% 30%,var(--peg),var(--peg-2));
    box-shadow:0 0 0 1px rgba(0,0,0,.15) inset, 0 2px 6px var(--accent-glow);
    position:relative;
  }
  .brand__mark::after{content:"";position:absolute;inset:8px;border-radius:50%;
    border:2px solid rgba(0,0,0,.35);border-top-color:rgba(255,255,255,.55)}
  .brand__name{font-weight:700;font-size:14px;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand__name span{color:var(--muted);font-weight:500}

  .tuning{
    position:relative;flex:none;
  }
  .tuning select{
    appearance:none;-webkit-appearance:none;
    font-family:var(--font-data);font-size:12.5px;font-weight:600;letter-spacing:.5px;
    color:var(--ink);background:var(--track);
    border:1px solid var(--edge);border-radius:999px;
    padding:7px 30px 7px 13px;cursor:pointer;
  }
  .tuning::after{
    content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);
    pointer-events:none;color:var(--muted);font-size:11px;
  }

  .status{
    display:flex;align-items:center;justify-content:center;gap:7px;
    font-size:11.5px;color:var(--muted);letter-spacing:.4px;
    padding:0 0 6px;
  }
  .status__dot{width:7px;height:7px;border-radius:50%;background:var(--good);
    box-shadow:0 0 0 0 var(--good);animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--good) 60%,transparent)}
    70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

  .panel{padding:4px 18px 12px}
  .panel[hidden]{display:none}

  /* ---------- READOUT ---------- */
  .readout{text-align:center;padding:2px 0 6px}
  .note{
    font-family:var(--font-display);
    font-weight:800;line-height:.9;letter-spacing:-2px;
    font-size:clamp(74px,22vw,104px);
    color:var(--state,var(--ink));
    transition:color .25s ease;
    display:inline-flex;align-items:flex-start;justify-content:center;
  }
  .note__acc{font-size:.42em;letter-spacing:0;margin-top:.15em}
  .note__oct{font-family:var(--font-data);font-size:.26em;font-weight:600;color:var(--muted);
    margin-top:.55em;margin-left:.15em;letter-spacing:0}
  .readout__data{
    display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
    font-family:var(--font-data);font-size:12.5px;color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .readout__data b{color:var(--ink);font-weight:600}
  .cents{
    color:var(--state,var(--ink));font-weight:700;
    padding:2px 9px;border-radius:999px;background:var(--track);
    min-width:62px;text-align:center;
  }

  /* ---------- METER ROW ---------- */
  .meter-row{display:flex;align-items:flex-end;gap:6px;margin-top:2px}
  .gauge{flex:1 1 auto;min-width:0}
  .gauge__svg{width:100%;height:auto;display:block;overflow:visible}
  .g-tick{stroke:var(--faint);stroke-width:2}
  .g-tick--major{stroke:var(--muted);stroke-width:2.6}
  .g-arc{fill:none;stroke:var(--line);stroke-width:3;stroke-linecap:round}
  .g-zone{fill:none;stroke:var(--good);stroke-width:4.5;stroke-linecap:round;opacity:.9}
  .g-needle{stroke:var(--state,var(--accent));stroke-width:3.4;stroke-linecap:round;
    transition:transform .28s cubic-bezier(.22,1.1,.36,1), stroke .25s ease}
  .g-hub{fill:var(--state,var(--accent));transition:fill .25s ease}
  .g-hub-ring{fill:none;stroke:var(--edge);stroke-width:2}
  .g-label{fill:var(--muted);font:600 13px var(--font-ui)}
  .gauge__cap{display:flex;justify-content:space-between;
    font-size:10.5px;letter-spacing:.4px;color:var(--faint);margin-top:-4px;padding:0 2px}

  .avatar{
    flex:0 0 96px;width:96px;height:118px;position:relative;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .avatar__img{
    position:absolute;bottom:0;max-width:100%;max-height:118px;
    opacity:0;transform:translateY(6px) scale(.9);
    transition:opacity .22s ease,transform .3s cubic-bezier(.2,1.2,.3,1);
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.22));
  }
  .avatar__img.is-on{opacity:1;transform:translateY(0) scale(1)}

  /* ---------- HEADSTOCK ---------- */
  .headstock{margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .headstock__svg{width:100%;height:auto;display:block;max-height:210px}
  .peg-btn{cursor:pointer}
  .peg-neck{fill:var(--faint);transition:.2s}
  .peg-body{fill:var(--track);stroke:var(--edge);stroke-width:2;transition:.2s}
  .peg-post{fill:var(--muted);transition:.2s}
  .peg-label{fill:var(--muted);font:700 14px var(--font-data);text-anchor:middle;dominant-baseline:middle;transition:.2s}
  .peg-btn.is-sel .peg-body{fill:var(--peg);stroke:var(--peg-2);
    filter:drop-shadow(0 0 8px var(--accent-glow))}
  .peg-btn.is-sel .peg-post{fill:var(--peg-2)}
  .peg-btn.is-sel .peg-neck{fill:var(--peg-2)}
  .peg-btn.is-sel .peg-label{fill:var(--on-accent)}
  .peg-btn:focus-visible{outline:none}
  .peg-btn:focus-visible .peg-body{stroke:var(--accent);stroke-width:3}
  .hs-body{fill:var(--track);stroke:var(--edge);stroke-width:2}
  .hs-nut{fill:var(--faint)}
  .hs-string{stroke:var(--faint);stroke-width:1.6;opacity:.75}
  .headstock__hint{text-align:center;font-size:11px;color:var(--faint);margin-top:2px}

  /* ---------- METRONOME ---------- */
  .metro{display:flex;flex-direction:column;align-items:center;gap:20px;padding:14px 6px 8px}
  .bpm{ text-align:center;line-height:1 }
  .bpm__num{font-family:var(--font-display);font-weight:800;font-size:76px;letter-spacing:-2px;
    font-variant-numeric:tabular-nums;color:var(--ink)}
  .bpm__unit{display:block;font-family:var(--font-data);font-size:12px;letter-spacing:3px;
    color:var(--muted);margin-top:2px}
  .beats{display:flex;gap:16px;align-items:center}
  .beat{width:20px;height:20px;border-radius:50%;background:var(--track);
    border:1.6px solid var(--edge);transition:transform .08s ease,background .08s ease,box-shadow .08s ease}
  .beat--down{border-color:var(--peg-2)}
  .beat.is-hit{background:var(--accent);box-shadow:0 0 14px var(--accent-glow);transform:scale(1.35)}
  .beat--down.is-hit{background:var(--good);box-shadow:0 0 16px color-mix(in srgb,var(--good) 55%,transparent)}
  .bpm-ctrl{display:flex;align-items:center;gap:14px;width:100%;max-width:320px}
  .round-btn{
    width:44px;height:44px;flex:none;border-radius:50%;
    border:1px solid var(--edge);background:var(--track);color:var(--ink);
    font-size:22px;font-weight:600;cursor:pointer;display:grid;place-items:center;line-height:0;
    transition:.15s}
  .round-btn:active{transform:scale(.94)}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:999px;
    background:var(--track);cursor:pointer;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--peg),var(--peg-2));border:1px solid var(--peg-2);
    box-shadow:0 2px 6px var(--accent-glow)}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border:1px solid var(--peg-2);border-radius:50%;
    background:var(--peg)}
  input[type=range]:focus-visible{box-shadow:0 0 0 3px var(--accent-glow)}
  .start-btn{
    display:inline-flex;align-items:center;gap:9px;
    padding:13px 34px;border-radius:999px;border:1px solid var(--peg-2);
    background:linear-gradient(180deg,var(--peg),var(--peg-2));color:var(--on-accent);
    font-weight:700;font-size:15px;letter-spacing:.3px;cursor:pointer;
    box-shadow:0 8px 20px -8px var(--accent-glow);transition:.15s}
  .start-btn:active{transform:translateY(1px)}
  .start-btn.is-running{background:var(--track);color:var(--ink);border-color:var(--edge);box-shadow:none}

  /* ---------- TABS ---------- */
  .tabs{display:flex;border-top:1px solid var(--line);background:var(--device-2)}
  .tab{
    flex:1;padding:14px 8px;border:0;background:none;cursor:pointer;
    font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--muted);
    display:flex;flex-direction:column;align-items:center;gap:4px;letter-spacing:.2px;
    border-top:2px solid transparent;margin-top:-1px;transition:.15s}
  .tab svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
  .tab.is-active{color:var(--accent);border-top-color:var(--accent)}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:-4px;border-radius:6px}

  /* ---------- MOCKUP CONTROLS ---------- */
  .demo{
    width:100%;max-width:400px;border:1px dashed var(--edge);border-radius:16px;
    background:color-mix(in srgb,var(--device) 55%, transparent);
    padding:14px 16px;display:flex;flex-direction:column;gap:12px}
  .demo__head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .demo__title{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);font-weight:700}
  .demo__row{display:flex;align-items:center;gap:12px}
  .demo__row label{font-size:12px;color:var(--muted);min-width:132px;font-variant-numeric:tabular-nums}
  .chip{
    border:1px solid var(--edge);background:var(--track);color:var(--ink);
    border-radius:999px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
  .chip.is-on{background:var(--accent);border-color:var(--peg-2);color:var(--on-accent)}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>

      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h16M12 6v12" stroke-linecap="round"/><circle cx="12" cy="12" r="3"/></svg>
      Stimmen
    </button>
    <button class="tab" id="tab-metro" role="tab" aria-selected="false" data-tab="metro">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8l3 18H5z" stroke-linejoin="round"/><path d="M12 20V9" stroke-linecap="round"/></svg>
      Metronom
    </button>
  </nav>
</main>

<!-- ===== MOCKUP CONTROLS (nur Demo) ===== -->
<div class="demo" aria-label="Mockup-Steuerung">
  <div class="demo__head">
    <span class="demo__title">Mockup-Steuerung · nur Demo</span>
    <button class="chip" id="themeBtn">◐ Theme</button>
  </div>
  <div class="demo__row">
    <label for="centRange">Abweichung: <b id="centVal">+4</b> ¢</label>
    <input type="range" id="centRange" min="-50" max="50" value="4" aria-label="Simulierte Abweichung in Cent">
  </div>
  <div class="demo__row">
    <button class="chip" id="demoBtn">▶ Auto-Einstimmen</button>
    <span style="font-size:11.5px;color:var(--faint)">simuliert das Hochstimmen einer Saite</span>
  </div>
</div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---------- data: tunings (low->high), A4=440 ----------
  var TUNINGS = {
    standard:{label:"Standard", strings:[
      {n:"E",acc:"",oct:2,hz:82.41},{n:"A",acc:"",oct:2,hz:110.00},{n:"D",acc:"",oct:3,hz:146.83},
      {n:"G",acc:"",oct:3,hz:196.00},{n:"B",acc:"",oct:3,hz:246.94},{n:"E",acc:"",oct:4,hz:329.63}]},
    dropd:{label:"Drop D", strings:[
      {n:"D",acc:"",oct:2,hz:73.42},{n:"A",acc:"",oct:2,hz:110.00},{n:"D",acc:"",oct:3,hz:146.83},
      {n:"G",acc:"",oct:3,hz:196.00},{n:"B",acc:"",oct:3,hz:246.94},{n:"E",acc:"",oct:4,hz:329.63}]},
    halfstep:{label:"½ tiefer", strings:[
      {n:"E",acc:"♭",oct:2,hz:77.78},{n:"A",acc:"♭",oct:2,hz:103.83},{n:"D",acc:"♭",oct:3,hz:138.59},
      {n:"G",acc:"♭",oct:3,hz:185.00},{n:"B",acc:"♭",oct:3,hz:233.08},{n:"E",acc:"♭",oct:4,hz:311.13}]},
    openg:{label:"Open G", strings:[
      {n:"D",acc:"",oct:2,hz:73.42},{n:"G",acc:"",oct:2,hz:98.00},{n:"D",acc:"",oct:3,hz:146.83},
      {n:"G",acc:"",oct:3,hz:196.00},{n:"B",acc:"",oct:3,hz:246.94},{n:"D",acc:"",oct:4,hz:293.66}]}
  };

  var state = {tuning:"standard", strIdx:2, cents:4};

  // ---------- gauge (pendulum needle over an arc) ----------
  var SVGNS="http://www.w3.org/2000/svg";
  var gauge=document.getElementById("gaugeSvg");
  var CX=150, CY=150, R=118, SPAN=52; // degrees each side
  function polar(deg,r){var a=(deg-90)*Math.PI/180;return [CX+r*Math.cos(a),CY+r*Math.sin(a)];}
  function el(tag,attrs){var e=document.createElementNS(SVGNS,tag);for(var k in attrs)e.setAttribute(k,attrs[k]);return e;}
  function buildGauge(){
    // arc background
    var a0=polar(-SPAN,R), a1=polar(SPAN,R);
    gauge.appendChild(el("path",{class:"g-arc",d:"M"+a0[0]+" "+a0[1]+" A"+R+" "+R+" 0 0 1 "+a1[0]+" "+a1[1]}));
    // green in-tune zone (~ +/-5 cents -> +/-5.2 deg)
    var z=SPAN*(6/50), z0=polar(-z,R), z1=polar(z,R);
    gauge.appendChild(el("path",{class:"g-zone",d:"M"+z0[0]+" "+z0[1]+" A"+R+" "+R+" 0 0 1 "+z1[0]+" "+z1[1]}));
    // ticks every 10 cents
    for(var c=-50;c<=50;c+=10){
      var deg=SPAN*(c/50), major=(c%50===0||c===0);
      var p0=polar(deg,R-(major?14:8)), p1=polar(deg,R+2);
      gauge.appendChild(el("line",{class:"g-tick"+(major?" g-tick--major":""),x1:p0[0],y1:p0[1],x2:p1[0],y2:p1[1]}));
    }
    // needle
    var needle=el("line",{class:"g-needle",id:"needle",x1:CX,y1:CY,x2:CX,y2:CY-R+4});
    needle.style.transformOrigin=CX+"px "+CY+"px";
    gauge.appendChild(needle);
    gauge.appendChild(el("circle",{class:"g-hub-ring",cx:CX,cy:CY,r:11}));
    gauge.appendChild(el("circle",{class:"g-hub",id:"hub",cx:CX,cy:CY,r:6}));
  }

  // ---------- headstock (3+3) ----------
  var hs=document.getElementById("hsSvg");
  var pegNodes=[];
  // rows: left side gets low strings 0,1,2 ; right side gets 5,4,3 (high->low top to bottom)
  var LAYOUT=[
    {idx:0,side:"L",row:0},{idx:1,side:"L",row:1},{idx:2,side:"L",row:2},
    {idx:5,side:"R",row:0},{idx:4,side:"R",row:1},{idx:3,side:"R",row:2}
  ];
  function buildHeadstock(){
    // headstock paddle (nut at bottom, rounded top)
    hs.appendChild(el("path",{class:"hs-body",d:"M88 186 L88 50 Q88 20 130 16 Q172 20 172 50 L172 186 Z"}));
    hs.appendChild(el("rect",{class:"hs-nut",x:86,y:184,width:88,height:9,rx:3}));
    var rowY=[62,116,170];
    LAYOUT.forEach(function(L){
      var y=rowY[L.row], isL=L.side==="L";
      var btnX=isL?72:188;     // knob center — straddles the headstock edge
      var postX=isL?112:148;   // string post (winder) on the wood face
      var g=el("g",{class:"peg-btn",tabindex:"0",role:"button","data-idx":L.idx,"aria-label":"Saite manuell wählen"});
      // string from post to nut center
      hs.appendChild(el("line",{class:"hs-string",x1:postX,y1:y,x2:130,y2:184}));
      // neck: connects knob -> post, sits on the wood (reads as mounted hardware)
      g.appendChild(el("rect",{class:"peg-neck",x:isL?92:146,y:y-4,width:22,height:8,rx:3}));
      // winder post on the face
      g.appendChild(el("circle",{class:"peg-post",cx:postX,cy:y,r:6}));
      // knob (labeled), overlapping the edge so it looks attached
      g.appendChild(el("rect",{class:"peg-body",x:btnX-24,y:y-15,width:48,height:30,rx:11}));
      var lab=el("text",{class:"peg-label",x:btnX,y:y+1});
      g.appendChild(lab);
      hs.appendChild(g);
      g.__lab=lab; g.__idx=L.idx; pegNodes.push(g);
      g.addEventListener("click",function(){selectString(this.__idx);});
      g.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();selectString(this.__idx);}});
    });
  }

  // ---------- render ----------
  var noteName=document.getElementById("noteName"),noteAcc=document.getElementById("noteAcc"),
      noteOct=document.getElementById("noteOct"),targetHz=document.getElementById("targetHz"),
      measuredHz=document.getElementById("measuredHz"),centsEl=document.getElementById("centsEl"),
      centVal=document.getElementById("centVal"),statusTxt=document.getElementById("statusTxt"),
      root=document.documentElement;
  var avatars={low:document.getElementById("avLow"),ok:document.getElementById("avOk"),high:document.getElementById("avHigh")};

  function stateColor(c){ if(Math.abs(c)<=5) return "var(--good)"; return c<0?"var(--flat)":"var(--sharp)"; }
  function render(){
    var t=TUNINGS[state.tuning], s=t.strings[state.strIdx], c=Math.round(state.cents);
    var col=stateColor(c);
    // note
    noteName.textContent=s.n; noteAcc.textContent=s.acc||""; noteOct.textContent=s.oct;
    document.getElementById("noteEl").style.setProperty("--state",col);
    // data
    targetHz.textContent=s.hz.toFixed(2);
    measuredHz.textContent=(s.hz*Math.pow(2,c/1200)).toFixed(1);
    centsEl.textContent=(c>0?"+":"")+c+" ¢"; centsEl.style.setProperty("--state",col);
    centVal.textContent=(c>0?"+":"")+c;
    statusTxt.textContent = Math.abs(c)<=5 ? "gestimmt ✓" : (c<0?"tiefer stimmen ↑":"höher … zu hoch ↓");
    // gauge
    var deg=SPAN*(Math.max(-50,Math.min(50,c))/50);
    var n=document.getElementById("needle"), h=document.getElementById("hub");
    if(n){n.style.transform="rotate("+deg+"deg)"; n.style.stroke=col;}
    if(h){h.setAttribute("fill",col.indexOf("var")===0?getComputedStyle(root).getPropertyValue("--good"):col);}
    // needle/hub color via CSS var
    if(n) n.style.setProperty("stroke",col);
    if(h) h.style.setProperty("fill",col);
    // avatar
    var key=Math.abs(c)<=5?"ok":(c<0?"low":"high");
    for(var k in avatars) avatars[k].classList.toggle("is-on", k===key);
    // pegs
    pegNodes.forEach(function(g){
      var st=t.strings[g.__idx];
      g.__lab.textContent=st.n+(st.acc||"");
      g.classList.toggle("is-sel", g.__idx===state.strIdx);
    });
  }

  function selectString(i){ state.strIdx=i; render(); }

  // ---------- tuning select ----------
  document.getElementById("tuningSel").addEventListener("change",function(){
    state.tuning=this.value;
    if(state.strIdx>5)state.strIdx=5;
    render();
  });

  // ---------- demo: cents slider + auto tune ----------
  var centRange=document.getElementById("centRange");
  centRange.addEventListener("input",function(){ stopDemo(); state.cents=+this.value; render(); });
  var demoBtn=document.getElementById("demoBtn"), demoRAF=null, demoT=0;
  function stopDemo(){ if(demoRAF){cancelAnimationFrame(demoRAF);demoRAF=null;} demoBtn.classList.remove("is-on"); demoBtn.textContent="▶ Auto-Einstimmen"; }
  function startDemo(){
    demoBtn.classList.add("is-on"); demoBtn.textContent="⏸ Läuft …"; demoT=0;
    var start=-38+Math.round(Math.sin(Date.now?0:0)); // deterministic-ish start
    var from=-40, cur=from;
    function step(){
      demoT+=1;
      // ease toward 0 with a little overshoot wobble
      cur = cur + (0-cur)*0.06 + Math.sin(demoT/9)*Math.max(0,(Math.abs(cur)-3))*0.15;
      state.cents=Math.max(-50,Math.min(50,cur));
      centRange.value=Math.round(state.cents);
      render();
      if(Math.abs(cur)<0.5 && demoT>40){ state.cents=0;centRange.value=0;render(); stopDemo(); return; }
      demoRAF=requestAnimationFrame(step);
    }
    if(reduce){ state.cents=0;centRange.value=0;render();stopDemo();return; }
    demoRAF=requestAnimationFrame(step);
  }
  demoBtn.addEventListener("click",function(){ demoRAF?stopDemo():startDemo(); });

  // ---------- tabs ----------
  var panels={tuner:document.getElementById("panel-tuner"),metro:document.getElementById("panel-metro")};
  document.querySelectorAll(".tab").forEach(function(btn){
    btn.addEventListener("click",function(){
      var t=this.dataset.tab;
      document.querySelectorAll(".tab").forEach(function(b){b.classList.toggle("is-active",b===btn);b.setAttribute("aria-selected",b===btn);});
      panels.tuner.hidden=(t!=="tuner"); panels.metro.hidden=(t!=="metro");
    });
  });

  // ---------- metronome ----------
  var beatsWrap=document.getElementById("beats"), BEATS=4, beatEls=[];
  for(var i=0;i<BEATS;i++){var d=document.createElement("div");d.className="beat"+(i===0?" beat--down":"");beatsWrap.appendChild(d);beatEls.push(d);}
  var bpm=120, running=false, ac=null, nextNote=0, curBeat=0, schedTimer=null, lookahead=25, aheadT=0.1;
  var uiQ=[];
  var bpmNum=document.getElementById("bpmNum"), bpmRange=document.getElementById("bpmRange");
  function setBpm(v){ bpm=Math.max(40,Math.min(240,v)); bpmNum.textContent=bpm; bpmRange.value=bpm; }
  bpmRange.addEventListener("input",function(){setBpm(+this.value);});
  document.getElementById("bpmUp").addEventListener("click",function(){setBpm(bpm+1);});
  document.getElementById("bpmDown").addEventListener("click",function(){setBpm(bpm-1);});

  function click(time,accent){
    if(!ac)return;
    var o=ac.createOscillator(), g=ac.createGain();
    o.frequency.value=accent?1500:900; o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.0001,time);
    g.gain.exponentialRampToValueAtTime(accent?0.5:0.32,time+0.001);
    g.gain.exponentialRampToValueAtTime(0.0001,time+0.05);
    o.start(time); o.stop(time+0.06);
  }
  function scheduler(){ // Chris Wilson "two clocks" lookahead
    while(nextNote < ac.currentTime + aheadT){
      click(nextNote, curBeat%BEATS===0);
      uiQ.push({beat:curBeat%BEATS,time:nextNote});
      nextNote += 60/bpm; curBeat++;
    }
    schedTimer=setTimeout(scheduler,lookahead);
  }
  function draw(){
    if(!running)return;
    var t=ac.currentTime;
    while(uiQ.length && uiQ[0].time<=t){
      var b=uiQ.shift().beat;
      beatEls.forEach(function(e,i){e.classList.toggle("is-hit",i===b);});
    }
    requestAnimationFrame(draw);
  }
  var startBtn=document.getElementById("startBtn"), startLbl=document.getElementById("startLbl");
  startBtn.addEventListener("click",function(){
    if(!running){
      ac=ac||new (window.AudioContext||window.webkitAudioContext)();
      if(ac.state==="suspended")ac.resume(); // iOS: unlock on gesture
      running=true; curBeat=0; nextNote=ac.currentTime+0.06; uiQ=[];
      startBtn.classList.add("is-running"); startBtn.setAttribute("aria-pressed","true"); startLbl.textContent="Stop";
      scheduler(); requestAnimationFrame(draw);
    } else {
      running=false; clearTimeout(schedTimer);
      startBtn.classList.remove("is-running"); startBtn.setAttribute("aria-pressed","false"); startLbl.textContent="Start";
      beatEls.forEach(function(e){e.classList.remove("is-hit");});
    }
  });

  // ---------- theme toggle ----------
  document.getElementById("themeBtn").addEventListener("click",function(){
    var cur=root.getAttribute("data-theme");
    var next = cur==="dark"?"light":(cur==="light"?"dark": (matchMedia("(prefers-color-scheme: dark)").matches?"light":"dark"));
    root.setAttribute("data-theme",next);
  });

  // ---------- init ----------
  buildGauge(); buildHeadstock(); render();
})();
</script>
